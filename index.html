<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Game Live - Master Reset Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .main-wrapper { display: flex; max-width: 1000px; margin: auto; gap: 20px; flex-wrap: wrap; }
        .container { flex: 2; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; min-width: 320px; }
        .sidebar { flex: 1; background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 15px rgba(0,0,0,0.1); min-width: 250px; max-height: 80vh; overflow-y: auto; }
        .timer { font-size: 3rem; font-weight: bold; color: #d9534f; margin: 20px 0; font-family: monospace; }
        .status-badge { padding: 5px 15px; border-radius: 20px; background: #eee; font-size: 0.8rem; font-weight: bold; }
        .hidden { display: none !important; }
        input, button { padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; background: #007bff; color: white; border: none; font-weight: bold; font-size: 1rem; }
        button:hover:not(:disabled) { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .results-box { margin-top: 30px; padding: 20px; border: 2px solid #28a745; background: #f0fff4; border-radius: 12px; }
        .winner-name { color: #28a745; font-size: 1.5rem; font-weight: bold; display: block; margin-top: 5px; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #f0f0f0; text-align: left; }
        .admin-panel { margin-top: 40px; padding-top: 20px; border-top: 2px dashed #ccc; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <h1>🚂 Train Game Live</h1>
        <span id="game-status" class="status-badge">WAITING</span>
        <div class="timer" id="timer-display">03:00</div>

        <div id="entry-area" class="hidden">
            <form id="nickname-form">
                <input type="text" id="nickname-input" placeholder="Enter unique nickname" required>
                <button type="submit">Join Game</button>
            </form>
        </div>

        <div id="results-area" class="hidden">
            <div class="results-box">
                <div><strong>Train Conductor:</strong> <span id="res-conductor" class="winner-name">TBD</span></div>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #c3e6cb;">
                <div><strong>VIP Passenger:</strong> <span id="res-vip" class="winner-name">TBD</span></div>
            </div>
        </div>

        <div class="admin-panel">
            <input type="password" id="admin-pass" placeholder="Admin Password">
            <button id="btn-start-game" onclick="startGame()" style="background: #28a745;">Start Countdown</button>
            <div id="selection-buttons" class="hidden">
                <button id="btn-choose-conductor" onclick="pickWinner('conductor')" style="background: #f0ad4e;">Choose Conductor</button>
                <button id="btn-choose-vip" onclick="pickWinner('vip')" style="background: #5bc0de;">Choose VIP</button>
            </div>
            <button onclick="resetGame()" style="background: #d9534f; margin-top: 20px;">Master Reset</button>
        </div>
    </div>

    <div class="sidebar">
        <h3>Participants (<span id="player-count">0</span>)</h3>
        <ul id="list-participants"></ul>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION (REPLACE WITH YOUR KEYS) ---
    const firebaseConfig = {
      apiKey: "AIzaSyDLDsHOG05GiK7_M6qpOPcvrWGfW23b9JA",
      authDomain: "slua-train.firebaseapp.com",
      projectId: "slua-train",
      storageBucket: "slua-train.firebasestorage.app",
      messagingSenderId: "921691212964",
      appId: "1:921691212964:web:ef8bf38225da3dea28ea31",
      measurementId: "G-9D798G6HNV"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const gameRef = db.ref('trainGame');

    let activeInterval = null; // To stop the timer loop on reset

    // --- 2. LIVE DATA SYNC ---
    gameRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        
        // Sync Timer
        const time = (data.timeLeft !== undefined) ? data.timeLeft : 180;
        const mins = Math.floor(time / 60);
        const secs = time % 60;
        document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

        // Sync State & UI
        const status = data.gameState || 'waiting';
        document.getElementById('game-status').innerText = status.toUpperCase();

        if (status === 'active') {
            document.getElementById('entry-area').classList.remove('hidden');
            document.getElementById('btn-start-game').classList.add('hidden');
            document.getElementById('selection-buttons').classList.add('hidden');
        } else if (status === 'finished') {
            document.getElementById('entry-area').classList.add('hidden');
            document.getElementById('selection-buttons').classList.remove('hidden');
        } else {
            // Waiting/Reset State
            document.getElementById('entry-area').classList.add('hidden');
            document.getElementById('btn-start-game').classList.remove('hidden');
            document.getElementById('selection-buttons').classList.add('hidden');
            document.getElementById('results-area').classList.add('hidden');
        }

        // Winners
        if (data.conductor || data.vip) {
            document.getElementById('results-area').classList.remove('hidden');
            document.getElementById('res-conductor').innerText = data.conductor || "TBD";
            document.getElementById('res-vip').innerText = data.vip || "TBD";
            document.getElementById('btn-choose-conductor').disabled = !!data.conductor;
            document.getElementById('btn-choose-vip').disabled = !!data.vip;
        }

        // Participants
        const participants = data.participants ? Object.values(data.participants) : [];
        document.getElementById('player-count').innerText = participants.length;
        const listUI = document.getElementById('list-participants');
        listUI.innerHTML = "";
        participants.forEach(name => {
            const li = document.createElement('li');
            li.textContent = "👤 " + name;
            listUI.appendChild(li);
        });
    });

    // --- 3. ACTIONS ---
    document.getElementById('nickname-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const input = document.getElementById('nickname-input');
        const name = input.value.trim();
        gameRef.child('participants').once('value', (snap) => {
            const players = snap.val() ? Object.values(snap.val()) : [];
            if (players.includes(name)) return alert("Name taken!");
            gameRef.child('participants').push(name);
            input.value = "";
        });
    });

    function startGame() {
        if (document.getElementById('admin-pass').value !== "reaperbalamyt") return alert("Wrong Password!");
        let timeLeft = 180;
        gameRef.update({ gameState: 'active', timeLeft: timeLeft });
        
        if(activeInterval) clearInterval(activeInterval);
        activeInterval = setInterval(() => {
            timeLeft--;
            gameRef.child('timeLeft').set(Math.max(timeLeft, 0));
            if (timeLeft <= 0) {
                clearInterval(activeInterval);
                gameRef.child('gameState').set('finished');
            }
        }, 1000);
    }

    function pickWinner(type) {
        if (document.getElementById('admin-pass').value !== "reaperbalamyt") return alert("Wrong Password!");
        gameRef.once('value', (snap) => {
            const data = snap.val();
            const players = data.participants ? Object.values(data.participants) : [];
            if (players.length < 1) return alert("No players!");

            if (type === 'conductor') {
                const winner = players[Math.floor(Math.random() * players.length)];
                gameRef.child('conductor').set(winner);
            } else {
                const remaining = players.filter(p => p !== data.conductor);
                if (remaining.length === 0) return alert("No one left for VIP!");
                const winner = remaining[Math.floor(Math.random() * remaining.length)];
                gameRef.child('vip').set(winner);
            }
        });
    }

    // MASTER RESET FIX
    function resetGame() {
        if (document.getElementById('admin-pass').value !== "balamytreaper") return alert("Wrong Restart Password!");
        
        // 1. Stop the local interval loop immediately
        if(activeInterval) clearInterval(activeInterval);
        
        // 2. Clear Firebase entirely
        gameRef.set({
            gameState: 'waiting',
            timeLeft: 180,
            participants: null,
            conductor: null,
            vip: null
        }).then(() => {
            alert("Master Reset Complete. Page will refresh.");
            location.reload(); // 3. Refresh to clear all local app states
        });
    }
</script>

</body>
</html>
